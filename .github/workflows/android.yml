name: Android CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # Boot Java 17 strictly to handle modern Google SDK tools
    - name: Set up JDK 17 for SDK Manager
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Download Legacy Android Build Tools
      run: |
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;30.0.3"

    # Swap the runner back to Java 11 so the old Gradle code compiles safely
    - name: Set up JDK 11 for Legacy Gradle
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Local Properties
      run: |
        echo "android.sdk=$ANDROID_HOME" > local.properties
        echo "android.buildtools=30.0.3" >> local.properties
        echo "android.ndk=$ANDROID_HOME/ndk-bundle" >> local.properties

    - name: Build with Gradle
      run: ./gradlew build -Pandroid.sdk=$ANDROID_HOME -Pandroid.ndk=$ANDROID_HOME/ndk-bundle -Pandroid.buildtools=30.0.3

    - name: Upload Magisk Module Artifact
      uses: actions/upload-artifact@v4
      with:
        name: riru-vpnhide-module
        path: app/build/outputs/*.zip
