name: Android CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # Downloads old Build Tools at runtime and creates the local.properties configuration
    - name: Setup Android Build Tools & Local Properties
      run: |
        # 1. Accept SDK licenses and install version 30.0.3
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;30.0.3"

        # 2. Generate local.properties for the custom gradle script
        echo "android.sdk=$ANDROID_HOME" > local.properties
        echo "android.buildtools=30.0.3" >> local.properties
        echo "android.ndk=$ANDROID_HOME/ndk-bundle" >> local.properties

    - name: Build with Gradle
      run: ./gradlew build -Pandroid.sdk=$ANDROID_HOME -Pandroid.ndk=$ANDROID_HOME/ndk-bundle -Pandroid.buildtools=30.0.3

    - name: Upload Magisk Module Artifact
      uses: actions/upload-artifact@v4
      with:
        name: riru-vpnhide-module
        path: app/build/outputs/*.zip
