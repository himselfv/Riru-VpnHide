name: Android CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew build -Pandroid.sdk=$ANDROID_HOME -Pandroid.ndk=$ANDROID_HOME/ndk-bundle

    - name: Upload Magisk Module Artifact
      uses: actions/upload-artifact@v4
      with:
        name: riru-vpnhide-module
        path: app/build/outputs/*.zip
